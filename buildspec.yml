version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "us-east-1"
    AWS_ACCOUNT_ID: "269174115208"
    IMAGE_REPO_NAME: "blacklist-servicess"
    CONTAINER_NAME: "blacklist-services"
    CONTAINER_PORT: "5000"

phases:
  install:
    commands:
      - echo "=== Instalando dependencias para pruebas ==="
      - python3 --version
      - pip3 install --upgrade pip
      - pip3 install -r requirements.txt
      - python3 -m pytest --version

  pre_build:
    commands:
      - echo "=== Ejecutando pruebas unitarias ==="
      - python3 -m pytest tests/ -v --junitxml=test-results.xml
      - echo "=== Login a ECR ==="
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - IMAGE_TAG=${CODEBUILD_RESOLVED_SOURCE_VERSION}

  build:
    commands:
      - echo "=== Construyendo imagen Docker ==="
      - docker build -t $IMAGE_REPO_NAME .
      - docker tag $IMAGE_REPO_NAME:latest $REPOSITORY_URI:$IMAGE_TAG
      - docker tag $IMAGE_REPO_NAME:latest $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo "=== Subiendo imagen a ECR ==="
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo "=== Generando imageDetail.json ==="
      - printf '{"ImageURI":"%s"}' $REPOSITORY_URI:$IMAGE_TAG > imageDetail.json
      - echo "=== Generando imagedefinitions.json ==="
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json

reports:
  pytest-results:
    files:
      - test-results.xml
    file-format: JUNITXML

artifacts:
  files:
    - imageDetail.json
    - imagedefinitions.json
    - appspec.json
    - taskdef.json
    - test-results.xml
