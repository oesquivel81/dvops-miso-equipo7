version: 0.2

env:
  variables:
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    PYTHONPATH: "."

phases:
  install:
    commands:
      - echo "=== Configurando Python 3.12.13 ==="
      - export PY312="/root/.pyenv/versions/3.12.13/bin/python"
      - $PY312 --version
      - $PY312 -m pip install --upgrade pip
      - $PY312 -m pip install poetry
      - $PY312 -m poetry config virtualenvs.create false

  pre_build:
    commands:
      - echo "=== Instalando paquetes del proyecto ==="
      - export PY312="/root/.pyenv/versions/3.12.13/bin/python"
      - $PY312 -m poetry install --no-interaction --no-root

  build:
    commands:
      - echo "=== Ejecutando pruebas unitarias ==="
      - export PY312="/root/.pyenv/versions/3.12.13/bin/python"
      - $PY312 -m poetry run pytest tests/ -v --junitxml=test-results.xml

  post_build:
    commands:
      - echo "=== Build finalizado ==="

reports:
  pytest-results:
    files:
      - test-results.xml
    file-format: JUNITXML

artifacts:
  files:
    - "**/*"
  exclude-paths:
    - "task/**"
    - "**/__pycache__/**"
    - "**/*.pyc"
    - ".pytest_cache/**"
  name: blacklist-service-artifact
